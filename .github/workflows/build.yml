name: Build Project

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allow manual triggering of the workflow from the GitHub Actions interface

# Cancel previous runs if a new commit is pushed to the same PR or branch
concurrency:
  group: ${{ github.ref }}  # Group runs by the ref (branch or PR)
  cancel-in-progress: true  # Cancel any ongoing runs in the same group

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read          # Read access to repository contents
  pages: write            # Write access to GitHub Pages
  id-token: write         # Write access to ID tokens
  issues: write           # Write access to issues
  pull-requests: write    # Write access to pull requests
  actions: write          # Write access to GitHub Actions

jobs:
  build_project:
    runs-on: ubuntu-latest
    name: Build project
    steps:
      - name: Cleanup to free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true # saves approximately 12 GB
          dotnet: false
          haskell: false
          large-packages: false
          docker-images: false
          swap-storage: false


      - name: Checkout project
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # Fetch all history for all branches and tags


      - name: Build the project
        uses: leanprover/lean-action@c544e89643240c6b398f14a431bcdc6309e36b3e # v1.4.0
        with:
          use-github-cache: false
          build-args: :blueprint

      # - name: Generate upstreaming dashboard
      #   run: python3 scripts/upstreaming_dashboard.py

      # Pre-populate the docbuild workspace with Mathlib .olean files from the
      # Mathlib cache. The docgen-action script sets MATHLIB_NO_CACHE_ON_UPDATE=1
      # which prevents `lake update` from running `lake exe cache get`, so without
      # this step the docbuild would compile all of Mathlib from source (~6+ hours).
      - name: Pre-populate docbuild with Mathlib oleans
        run: |
          DOC_GEN_REV=$(cut -d: -f2 lean-toolchain)
          mkdir -p docbuild
          printf 'name = "docbuild"\nreservoir = false\nversion = "0.1.0"\npackagesDir = "../.lake/packages"\n\n[[require]]\nname = "BV"\npath = "../"\n\n[[require]]\nscope = "leanprover"\nname = "doc-gen4"\nrev = "%s"\n' "$DOC_GEN_REV" > docbuild/lakefile.toml
          cd docbuild
          ~/.elan/bin/lake update BV
          ~/.elan/bin/lake exe cache get

      - name: Compile blueprint and documentation
        uses: leanprover-community/docgen-action@dac784713171529c96f6d0470f7af30249a02a5d # 2026-02-08
        with:
          blueprint: true
          homepage: home_page
          references: 'blueprint/src/references.bib'